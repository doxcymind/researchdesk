<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ResearchDesk Login</title>

  <link rel="stylesheet" href="/styles.css">

</head>

<body>

<div class="login-container">

  <div class="login-card">

    <h1>🔬 ResearchDesk</h1>

    <p class="subtitle">
      AI-assisted research management for doctors, residents, and researchers
    </p>

    <form id="loginForm">

      <input
        type="text"
        placeholder="Username"
        id="username"
        required
      />

      <input
        type="password"
        placeholder="Password"
        id="password"
        required
      />

      <button type="submit">
        Login
      </button>

    </form>

  </div>

</div>

<script>

document
  .getElementById('loginForm')
  .addEventListener('submit', function(e) {

    e.preventDefault();

    window.location.href = '/dashboard.html';

});

</script>

</body>

</html>
