<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResearchDesk - AI-Assisted Research Management</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app" class="app">
    <header class="header">
      <div class="container">
        <h1 class="logo">🔬 ResearchDesk</h1>
        <nav class="nav">
          <a href="#" class="nav-link">Projects</a>
          <a href="#" class="nav-link">Docs</a>
          <a href="#" class="nav-link">Settings</a>
        </nav>
      </div>
    </header>

    <main class="main">
      <div class="container">
        <section class="hero">
          <h2>Welcome to ResearchDesk</h2>
          <p>AI-assisted research management for case reports, reviews, studies, and dissertations</p>
          <button class="btn btn-primary" id="newProject">New Project</button>
        </section>

        <section class="projects" id="projects">
          <h3>Your Projects</h3>
          <div class="projects-list" id="projectsList">
            <p class="empty-state">No projects yet. Create one to get started!</p>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 ResearchDesk. Open source under MIT License.</p>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
